<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margaret's 6-Project Automation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AutomationHub = () => {
            const [apiKeys, setApiKeys] = useState({
                buffer: ''
            });
            const [generatedContent, setGeneratedContent] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isScheduling, setIsScheduling] = useState(false);
            const [showSetup, setShowSetup] = useState(true);
            const [manualContent, setManualContent] = useState('');
            const [showManualImport, setShowManualImport] = useState(false);
            const [generatingImages, setGeneratingImages] = useState(false);
            const [imageProgress, setImageProgress] = useState('');
            const [instagramAccounts, setInstagramAccounts] = useState([]);
            const [projectToAccountMap, setProjectToAccountMap] = useState({
                'podcast-pal': '',
                'breaking-cycle': '',
                'daisy-chain': ''
            });
            const [lockedImages, setLockedImages] = useState({});

            const projects = [
                { id: 'podcast-pal', name: 'Podcast Pal', color: 'blue' },
                { id: 'breaking-cycle', name: 'Breaking the Cycle', color: 'purple' },
                { id: 'ai-bots', name: 'AI Teaching Bots', color: 'green' },
                { id: 'consultancy', name: 'Education Consultancy', color: 'yellow' },
                { id: 'echoes', name: 'Echoes', color: 'pink' },
                { id: 'daisy-chain', name: 'Daisy Chain', color: 'indigo' }
            ];

            const importManualContent = () => {
                try {
                    const content = JSON.parse(manualContent);
                    setGeneratedContent(content);
                    setShowSetup(false);
                    setShowManualImport(false);
                } catch (error) {
                    alert('Error parsing content. Make sure you copied the entire JSON from Claude.');
                }
            };

            const generateImages = async (forceNew = false) => {
                if (!generatedContent) return;
                
                setGeneratingImages(true);
                const updatedContent = JSON.parse(JSON.stringify(generatedContent));
                
                try {
                    let totalPosts = 0;
                    let generatedCount = 0;
                    
                    // Count posts needing images
                    Object.values(generatedContent).forEach(project => {
                        if (project.social) {
                            project.social.forEach((post, i) => {
                                const projectId = Object.keys(generatedContent).find(k => generatedContent[k] === project);
                                const imageKey = `${projectId}-${i}`;
                                if (!lockedImages[imageKey]) {
                                    totalPosts++;
                                }
                            });
                        }
                    });
                    
                    if (totalPosts === 0) {
                        alert('All images are locked! Unlock some to regenerate.');
                        setGeneratingImages(false);
                        return;
                    }
                    
                    const imagePromises = [];
                    
                    // Generate with Pollinations AI
                    for (const [projectId, projectData] of Object.entries(updatedContent)) {
                        if (projectData.social) {
                            for (let i = 0; i < projectData.social.length; i++) {
                                const post = projectData.social[i];
                                const imageKey = `${projectId}-${i}`;
                                
                                if (lockedImages[imageKey]) continue;
                                
                                generatedCount++;
                                setImageProgress(`Generating ${generatedCount} of ${totalPosts}... (takes 1-2 minutes)`);
                                
                                const imagePrompt = createImagePrompt(projectId, post.content, post.platform, forceNew);
                                const timestamp = Date.now() + (generatedCount * 1000);
                                const encodedPrompt = encodeURIComponent(imagePrompt);
                                
                                // Pollinations AI with flux model
                                const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1080&height=1080&seed=${timestamp}&model=flux&enhance=true&nologo=true`;
                                
                                post.imageUrl = imageUrl;
                                
                                // Verify image loads
                                const imagePromise = new Promise((resolve) => {
                                    const img = new Image();
                                    const timeout = setTimeout(() => {
                                        console.log(`Image ${generatedCount} timeout (normal for free API)`);
                                        resolve();
                                    }, 20000);
                                    
                                    img.onload = () => {
                                        clearTimeout(timeout);
                                        setImageProgress(`Loaded ${generatedCount} of ${totalPosts}...`);
                                        resolve();
                                    };
                                    
                                    img.onerror = () => {
                                        clearTimeout(timeout);
                                        resolve();
                                    };
                                    
                                    img.src = imageUrl;
                                });
                                
                                imagePromises.push(imagePromise);
                                
                                // 5 second delay between requests to avoid rate limits
                                await new Promise(resolve => setTimeout(resolve, 5000));
                            }
                        }
                    }
                    
                    setImageProgress(`Finalizing...`);
                    await Promise.all(imagePromises);
                    
                    setGeneratedContent(updatedContent);
                    setImageProgress('');
                    
                    const lockedCount = Object.keys(lockedImages).filter(k => lockedImages[k]).length;
                    alert(`✅ Generated ${totalPosts} images!\n\n${lockedCount > 0 ? `🔒 ${lockedCount} locked.\n\n` : ''}⚠️ Free API limits mean some may not load:\n• Upload your own if needed\n• Regenerate to retry\n• Wait 30s then refresh`);
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    setGeneratingImages(false);
                    setImageProgress('');
                }
            };
            
            const getProjectColor = (projectId) => {
                const colors = {
                    'podcast-pal': '22c55e',
                    'breaking-cycle': '8b5cf6',
                    'ai-bots': '10b981',
                    'consultancy': 'eab308',
                    'echoes': 'ec4899',
                    'daisy-chain': '6366f1'
                };
                return colors[projectId] || '6b7280';
            };
            
            const getProjectName = (projectId) => {
                const names = {
                    'podcast-pal': 'Podcast Pal',
                    'breaking-cycle': 'Breaking the Cycle',
                    'ai-bots': 'AI Bots',
                    'consultancy': 'Consultancy',
                    'echoes': 'Echoes',
                    'daisy-chain': 'Daisy Chain'
                };
                return names[projectId] || 'Social Post';
            };
            
            const uploadImage = (projectId, postIndex, file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const updatedContent = {...generatedContent};
                    updatedContent[projectId].social[postIndex].imageUrl = e.target.result;
                    setGeneratedContent(updatedContent);
                };
                reader.readAsDataURL(file);
            };
            
            const toggleImageLock = (projectId, postIndex) => {
                const imageKey = `${projectId}-${postIndex}`;
                setLockedImages(prev => ({
                    ...prev,
                    [imageKey]: !prev[imageKey]
                }));
            };
            
            const refreshImages = () => {
                // Force re-render by creating a new copy of content
                setGeneratedContent({...generatedContent});
                alert('✅ Images refreshed! They should load now.');
            };
            
            const getImageKeywords = (projectId, postContent) => {
                // Extract relevant keywords for stock photo search
                const contentLower = postContent.toLowerCase();
                
                // Project-specific keywords
                if (projectId === 'podcast-pal') {
                    return 'podcast,microphone,headphones,broadcasting,studio';
                } else if (projectId === 'breaking-cycle') {
                    if (contentLower.includes('chain') || contentLower.includes('break')) {
                        return 'chain,freedom,breaking,metallic';
                    } else if (contentLower.includes('journal') || contentLower.includes('episode')) {
                        return 'journal,writing,candlelight,notebook';
                    } else {
                        return 'path,forest,journey,sunrise';
                    }
                } else if (projectId === 'ai-bots') {
                    return 'technology,laptop,education,digital,learning';
                } else if (projectId === 'consultancy') {
                    return 'desk,workspace,professional,notebook,planning';
                } else if (projectId === 'echoes') {
                    if (contentLower.includes('photo') || contentLower.includes('memory')) {
                        return 'vintage,photos,album,memories,nostalgia';
                    } else {
                        return 'family,sunset,silhouette,together';
                    }
                } else if (projectId === 'daisy-chain') {
                    return 'daisy,flower,white-flower,nature,minimalist';
                }
                
                return 'minimalist,professional,clean';
            };
            
            const createImagePrompt = (projectId, postContent, platform, forceNew = false) => {
                const baseStyle = "professional stock photography, high quality commercial image, clean professional aesthetic, award-winning photography, ";
                
                // Extract key themes from caption for intentional matching
                const contentLower = postContent.toLowerCase();
                
                // Use random seed if regenerating, otherwise use week number
                const now = new Date();
                const weekNumber = forceNew ? Math.floor(Math.random() * 10000) : Math.floor((now - new Date(now.getFullYear(), 0, 1)) / 604800000);
                const weekMod = weekNumber % 3;
                
                let specificPrompt = "";
                
                // PODCAST PAL - Focus on OBJECTS and SPACES, not people
                if (projectId === 'podcast-pal') {
                    specificPrompt = weekMod === 0 
                        ? "professional podcast microphone in modern studio, lime green accent lighting, headphones on desk, clean minimalist workspace, broadcasting equipment, high-end audio setup"
                        : weekMod === 1
                        ? "world map with glowing connection lines between continents, green and blue color scheme, global network visualization, educational technology concept, modern infographic style"
                        : "stack of colorful international flags on modern desk, bright lime green notebook, podcast recording equipment visible, educational materials, inspiring workspace flatlay";
                }
                
                // BREAKING THE CYCLE - Focus on OBJECTS and SYMBOLS
                else if (projectId === 'breaking-cycle') {
                    specificPrompt = weekMod === 0
                        ? "heavy rusty chain breaking apart with golden light shining through the break, dramatic dark brown background, powerful metaphor, cinematic lighting, hope and freedom symbolism"
                        : weekMod === 1  
                        ? "open leather journal on dark wooden table, fountain pen, soft candlelight glow, handwritten inspirational quotes visible, warm brown tones, intimate cozy aesthetic, healing atmosphere"
                        : "single pathway through misty forest at dawn, fork in road ahead, soft golden sunlight filtering through trees, new beginnings metaphor, peaceful determination, atmospheric morning light";
                }
                
                // AI BOTS - Focus on TECH and OBJECTS
                else if (projectId === 'ai-bots') {
                    specificPrompt = weekMod === 0
                        ? "laptop displaying colorful AI interface dashboard, soft green ambient lighting, modern workspace, digital education icons on screen, clean tech aesthetic, futuristic learning tools"
                        : weekMod === 1
                        ? "glowing green neural network visualization, abstract AI circuitry, educational technology concept, modern digital art, inspiring innovation imagery, clean professional look"
                        : "tablet showing friendly educational app interface, bright modern classroom background slightly blurred, green accent colors, technology meets learning, optimistic future of education";
                }
                
                // CONSULTANCY - Focus on WORKSPACE and MATERIALS
                else if (projectId === 'consultancy') {
                    specificPrompt = weekMod === 0
                        ? "organized modern desk flatlay, yellow folders and notebooks, coffee cup, planning calendar, professional educational materials, clean minimalist workspace, overhead view, natural light"
                        : weekMod === 1
                        ? "modern conference room with whiteboard covered in colorful sticky notes, bright yellow accent wall, professional training space, natural window light, collaborative atmosphere"
                        : "stack of educational books and training materials, yellow highlights and sticky notes, laptop and coffee, professional development setup, inspiring learning environment, warm lighting";
                }
                
                // ECHOES - Focus on OBJECTS and MEMORIES
                else if (projectId === 'echoes') {
                    specificPrompt = weekMod === 0
                        ? "vintage photo album open on table, old family photographs scattered around, soft turquoise and grey tones, nostalgic memories theme, gentle natural light, emotional storytelling, timeless moments"
                        : weekMod === 1
                        ? "antique wooden memory box with handwritten letters and old photos, soft turquoise accent lighting, tender family heirlooms, legacy and heritage theme, peaceful composition"
                        : "sunset silhouettes of family walking together on beach, soft turquoise and lavender sky, peaceful togetherness, timeless connection, serene hopeful atmosphere, emotional journey";
                }
                
                // DAISY CHAIN - Focus on FLOWERS and NATURE
                else if (projectId === 'daisy-chain') {
                    specificPrompt = weekMod === 0
                        ? "extreme macro close-up of single white daisy with morning dew drops, soft blue-grey background, perfect petals, peaceful simplicity, golden hour soft light, botanical photography, mindful aesthetic"
                        : weekMod === 1
                        ? "field of white daisies swaying gently in breeze, shallow depth of field, soft blue sky, peaceful natural setting, serene pastoral scene, calming wellness vibe, dreamy composition"
                        : "single white daisy in clear glass vase on white windowsill, soft natural window light, minimalist Scandinavian aesthetic, peaceful wellness theme, gentle blue-grey tones, contemplative mood";
                }
                
                const platformStyle = platform === 'Instagram' ? "square 1:1 format, Instagram-ready" : "landscape 16:9 format, LinkedIn-optimized";
                
                const qualityModifiers = "no people, no hands, no faces, no text overlay, no watermarks, photorealistic, studio quality, commercial use ready";
                
                // Unique seed for each post
                const seed = weekNumber * 1000 + Math.abs(postContent.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0));
                
                return `${baseStyle}${specificPrompt}, ${platformStyle}, ${qualityModifiers}, seed:${seed}`;
            };

            const generatePrompt = () => {
                const prompt = `Generate a week's worth of content for Margaret's 6 business projects. Return ONLY valid JSON in this exact structure:

{
  "podcast-pal": {
    "emails": [{"subject": "...", "body": "..."}],
    "social": [{"platform": "LinkedIn", "content": "...", "scheduledDay": "Monday"}]
  },
  "breaking-cycle": {
    "social": [{"platform": "Instagram", "content": "...", "scheduledDay": "Wednesday"}]
  },
  "ai-bots": {
    "updates": "...",
    "social": [{"platform": "LinkedIn", "content": "...", "scheduledDay": "Tuesday"}]
  },
  "consultancy": {
    "emails": [{"subject": "...", "body": "..."}],
    "ideas": "..."
  },
  "echoes": {
    "emails": [{"subject": "B2B Partnership Pitch", "body": "..."}],
    "social": [{"platform": "LinkedIn", "content": "...", "scheduledDay": "Thursday"}]
  },
  "daisy-chain": {
    "social": [
      {"platform": "Instagram", "content": "Visual post concept...", "scheduledDay": "Monday"},
      {"platform": "Instagram", "content": "...", "scheduledDay": "Wednesday"},
      {"platform": "Instagram", "content": "...", "scheduledDay": "Friday"}
    ]
  }
}

CRITICAL - DO NOT MENTION:
❌ Wales (except in Echoes B2B context if relevant)
❌ NOS / National Online School / TCES
❌ "Where We Belong" podcast
❌ Benny or any NOS students
❌ PBL/Project-Based Learning (this is separate work)

PROJECT GUIDELINES:

PODCAST PAL:
- 1 newsletter email to schools (B2B pitch)
- 3 LinkedIn posts about international student podcasting exchange
- 3 Instagram posts showcasing student podcasting, global connections, cultural exchange
- Focus: School partnerships, cultural exchange, global citizenship
- Complete 8-week curriculum toolkit
- Email will be sent via IONOS manually (just draft it)
- Instagram: Visual content about student empowerment, international collaboration

BREAKING THE CYCLE:
- 3 Instagram posts promoting Episode 1 + teasing Episode 2
- Theme: Emotional healing, breaking relationship cycles, personal growth
- Audience growth focus
- NO new episode outline needed (Episode 2 not recorded yet)
- Warm, vulnerable, authentic tone

AI BOTS (Time For Class):
- Update notes for 3 Poe bots: TimeForClass (general teaching), TimeForClass-EAL (English support), TimeForClass-AI (AI literacy)
- 2 LinkedIn posts about educational AI, bot usage, teacher support
- NOT about PBL - general education focus

TIME FOR CLASS CONSULTANCY:
- 1 client outreach email (general education services, NOT PBL-specific)
- Ideas for new services/offerings
- Email will be sent via IONOS manually (just draft it)
- Focus: AI integration, curriculum consultation, teacher training

ECHOES:
- 1 B2B pitch email to hospices/funeral directors
- 2 LinkedIn thought leadership posts about digital legacy
- Email will be sent via Gmail manually (just draft it)
- Focus: Partnerships, milestone-triggered messages, AI personality modeling

DAISY CHAIN:
- 3 Instagram visual post concepts (NO voice notes)
- Ideas for resharing previous content
- Audience engagement (polls, questions about topics)
- Theme: Daisies, nature, wellness, slow living, mindfulness
- Keep consistent aesthetic

TONE: Warm, authentic, professional, inclusion-focused. "Different abilities, endless possibilities" for education content. Vulnerable and real for Breaking the Cycle. Professional for B2B pitches.`;
                
                navigator.clipboard.writeText(prompt);
                alert('✅ Prompt copied to clipboard!\n\nNow:\n1. Go to Claude.ai\n2. Paste this prompt\n3. Copy Claude\'s JSON response\n4. Come back here and click "Import Content"');
            };

            const fetchInstagramAccounts = async () => {
                if (!apiKeys.buffer) {
                    alert('Please enter your Buffer API key first!');
                    return;
                }
                
                try {
                    // GraphQL query to get all channels
                    const query = `
                        query {
                            account {
                                channels {
                                    id
                                    name
                                    service
                                }
                            }
                        }
                    `;
                    
                    const response = await fetch('/api/buffer-proxy', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            query: query,
                            token: apiKeys.buffer
                        })
                    });
                    
                    const result = await response.json();
                    
                    console.log('Buffer GraphQL response:', result);
                    
                    if (result.errors) {
                        alert('Error from Buffer: ' + JSON.stringify(result.errors));
                        return;
                    }
                    
                    if (result.data && result.data.account && result.data.account.channels) {
                        const igAccounts = result.data.account.channels.filter(channel => 
                            channel.service === 'instagram'
                        );
                        
                        // Convert to old format for compatibility
                        setInstagramAccounts(igAccounts.map(account => ({
                            id: account.id,
                            service: 'instagram',
                            service_username: account.name
                        })));
                        
                        if (igAccounts.length > 0) {
                            alert(`✅ Found ${igAccounts.length} Instagram account(s)!\n\nNow assign which account each project should post to.`);
                        } else {
                            alert('❌ No Instagram accounts found in Buffer.\n\nPlease connect your Instagram accounts to Buffer first.');
                        }
                    } else {
                        alert('Unexpected response. Check console for details.');
                        console.error('Full response:', result);
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    alert('Error connecting to Buffer: ' + error.message);
                }
            };

            const scheduleInstagram = async () => {
                if (!apiKeys.buffer) {
                    alert('⚠️ Please add your Buffer API key first!\n\nGo to Settings and paste your Buffer API key.');
                    return;
                }
                
                // Check if accounts are mapped
                const podcastPalAccount = projectToAccountMap['podcast-pal'];
                const breakingCycleAccount = projectToAccountMap['breaking-cycle'];
                const daisyChainAccount = projectToAccountMap['daisy-chain'];
                
                const missingAccounts = [];
                if (!podcastPalAccount) missingAccounts.push('Podcast Pal');
                if (!breakingCycleAccount) missingAccounts.push('Breaking the Cycle');
                if (!daisyChainAccount) missingAccounts.push('Daisy Chain');
                
                if (missingAccounts.length > 0) {
                    alert(`⚠️ Please assign Instagram accounts for:\n${missingAccounts.join('\n')}\n\nGo to Settings and select which Instagram account each project should post to.`);
                    return;
                }
                
                setIsScheduling(true);
                
                try {
                    // Collect all Instagram posts with their assigned accounts
                    const instagramPosts = [];
                    
                    Object.entries(generatedContent).forEach(([projectId, projectData]) => {
                        if (projectData.social) {
                            projectData.social.forEach(post => {
                                if (post.platform === 'Instagram') {
                                    let accountId = '';
                                    
                                    // Map project to Instagram account
                                    if (projectId === 'podcast-pal') {
                                        accountId = podcastPalAccount;
                                    } else if (projectId === 'breaking-cycle') {
                                        accountId = breakingCycleAccount;
                                    } else if (projectId === 'daisy-chain') {
                                        accountId = daisyChainAccount;
                                    }
                                    
                                    if (accountId && post.imageUrl && !post.imageUrl.includes('placehold.co')) {
                                        instagramPosts.push({
                                            ...post,
                                            projectId,
                                            accountId
                                        });
                                    }
                                }
                            });
                        }
                    });
                    
                    if (instagramPosts.length === 0) {
                        alert('⚠️ No Instagram posts ready to schedule!\n\nMake sure all posts have images (not placeholders).\n\nUse "Upload" button to add images, then try again.');
                        setIsScheduling(false);
                        return;
                    }
                    
                    // Schedule each post using GraphQL
                    let scheduled = 0;
                    const errors = [];
                    
                    for (const post of instagramPosts) {
                        const scheduledTime = getScheduledTime(post.scheduledDay);
                        
                        // Buffer's GraphQL mutation to create post
                        const mutation = `
                            mutation CreatePost($channelId: ID!, $text: String!, $dueAt: DateTime!, $media: [MediaInput!]) {
                                createPost(input: {
                                    channelId: $channelId,
                                    text: $text,
                                    schedulingType: automatic,
                                    mode: customSchedule,
                                    dueAt: $dueAt,
                                    media: $media
                                }) {
                                    ... on PostActionSuccess {
                                        post {
                                            id
                                            text
                                        }
                                    }
                                    ... on MutationError {
                                        message
                                    }
                                }
                            }
                        `;
                        
                        const variables = {
                            channelId: post.accountId,
                            text: post.content,
                            dueAt: new Date(scheduledTime * 1000).toISOString(),
                            media: post.imageUrl ? [{
                                url: post.imageUrl
                            }] : []
                        };
                        
                        try {
                            const response = await fetch('/api/buffer-proxy', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    query: mutation,
                                    variables: variables,
                                    token: apiKeys.buffer
                                })
                            });
                            
                            const result = await response.json();
                            console.log('Buffer response:', result);
                            
                            if (result.data && result.data.createPost && result.data.createPost.post) {
                                scheduled++;
                            } else if (result.data && result.data.createPost && result.data.createPost.message) {
                                errors.push(`${post.projectId} ${post.scheduledDay}: ${result.data.createPost.message}`);
                            } else if (result.errors) {
                                errors.push(`${post.projectId} ${post.scheduledDay}: ${result.errors[0].message}`);
                            }
                        } catch (error) {
                            errors.push(`${post.projectId} ${post.scheduledDay}: ${error.message}`);
                        }
                        
                        // Small delay to avoid rate limiting
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                    
                    if (scheduled > 0) {
                        alert(`✅ Success! Scheduled ${scheduled} Instagram posts via Buffer.\n\nThey'll post automatically throughout the week!${errors.length > 0 ? '\n\n⚠️ Some posts failed:\n' + errors.join('\n') : ''}`);
                    } else {
                        alert(`❌ Failed to schedule posts.\n\nErrors:\n${errors.join('\n')}\n\nCheck:\n1. Buffer API key is correct\n2. Instagram accounts are connected\n3. Images are valid URLs (not placeholders)`);
                    }
                    
                } catch (error) {
                    alert('Error scheduling Instagram posts:\n\n' + error.message + '\n\nMake sure:\n1. Buffer API key is correct\n2. Instagram is connected to Buffer\n3. All posts have images');
                } finally {
                    setIsScheduling(false);
                }
            };
            
            const getScheduledTime = (day) => {
                const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
                const today = new Date();
                const currentDay = today.getDay(); // 0 = Sunday, 1 = Monday, etc.
                const targetDay = days.indexOf(day) + 1; // Convert to 1-7 where Monday = 1
                
                let daysUntil = (targetDay - currentDay + 7) % 7;
                if (daysUntil === 0) daysUntil = 7; // If today, schedule for next week
                
                const targetDate = new Date(today);
                targetDate.setDate(today.getDate() + daysUntil);
                targetDate.setHours(10, 0, 0, 0); // 10 AM
                
                return Math.floor(targetDate.getTime() / 1000);
            };

            const downloadContent = () => {
                const blob = new Blob([JSON.stringify(generatedContent, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `content-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            if (showSetup) {
                return (
                    <div className="min-h-screen p-8">
                        <div className="max-w-2xl mx-auto">
                            <h1 className="text-4xl font-bold mb-2">🚀 Margaret's Automation Hub</h1>
                            <p className="text-gray-600 mb-8">Manage all 6 projects from one dashboard</p>

                            {!showManualImport ? (
                                <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                    <h2 className="text-2xl font-bold mb-4">Quick Start (100% Free)</h2>
                                    
                                    <div className="bg-green-50 border-l-4 border-green-400 p-4 mb-6">
                                        <h3 className="font-bold text-green-800 mb-2">✨ How This Works:</h3>
                                        <ol className="text-sm text-green-700 space-y-2 list-decimal list-inside">
                                            <li>Click "Copy Prompt" below</li>
                                            <li>Go to Claude.ai (the chat where you built this)</li>
                                            <li>Paste the prompt and hit enter</li>
                                            <li>Copy Claude's JSON response</li>
                                            <li>Come back here and paste it</li>
                                            <li>Review and schedule all your content!</li>
                                        </ol>
                                        <p className="text-xs text-green-600 mt-3">⏱️ Takes 2 minutes. Zero cost.</p>
                                    </div>

                                    <button
                                        onClick={generatePrompt}
                                        className="w-full bg-blue-600 text-white py-4 rounded-lg font-semibold hover:bg-blue-700 mb-4"
                                    >
                                        📋 Copy Prompt to Clipboard
                                    </button>

                                    <button
                                        onClick={() => setShowManualImport(true)}
                                        className="w-full bg-green-600 text-white py-4 rounded-lg font-semibold hover:bg-green-700"
                                    >
                                        ✅ I Got Claude's Response - Import Content
                                    </button>

                                    <div className="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                                        <h3 className="font-semibold text-blue-800 mb-2">📱 Optional: Instagram Auto-Posting</h3>
                                        <p className="text-sm text-blue-700 mb-3">Want Instagram posts to auto-schedule? Add your Buffer API key:</p>
                                        
                                        <div>
                                            <label className="block text-xs font-medium mb-1">
                                                Buffer API Key
                                                <a href="https://account.buffer.com/developers" target="_blank" className="text-blue-600 ml-2">(Get here)</a>
                                            </label>
                                            <input
                                                type="password"
                                                className="w-full border border-gray-300 rounded px-3 py-2 text-sm mb-2"
                                                placeholder="pSdQYnKhH-uFgBydeqmPZ4w3ISEo2emaSJC2D3veFv9"
                                                value={apiKeys.buffer}
                                                onChange={(e) => setApiKeys({...apiKeys, buffer: e.target.value})}
                                            />
                                            
                                            {apiKeys.buffer && (
                                                <button
                                                    onClick={fetchInstagramAccounts}
                                                    className="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 mb-2"
                                                >
                                                    🔍 Fetch My Instagram Accounts
                                                </button>
                                            )}
                                            
                                            {instagramAccounts.length > 0 && (
                                                <div className="mt-4 p-3 bg-white rounded border border-blue-200">
                                                    <h4 className="font-semibold text-sm mb-3">Assign Instagram Accounts to Projects:</h4>
                                                    
                                                    <div className="space-y-3">
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Podcast Pal →</label>
                                                            <select
                                                                className="w-full border border-gray-300 rounded px-2 py-1 text-sm"
                                                                value={projectToAccountMap['podcast-pal']}
                                                                onChange={(e) => setProjectToAccountMap({...projectToAccountMap, 'podcast-pal': e.target.value})}
                                                            >
                                                                <option value="">Select Instagram Account</option>
                                                                {instagramAccounts.map(account => (
                                                                    <option key={account.id} value={account.id}>
                                                                        @{account.service_username}
                                                                    </option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                        
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Breaking the Cycle →</label>
                                                            <select
                                                                className="w-full border border-gray-300 rounded px-2 py-1 text-sm"
                                                                value={projectToAccountMap['breaking-cycle']}
                                                                onChange={(e) => setProjectToAccountMap({...projectToAccountMap, 'breaking-cycle': e.target.value})}
                                                            >
                                                                <option value="">Select Instagram Account</option>
                                                                {instagramAccounts.map(account => (
                                                                    <option key={account.id} value={account.id}>
                                                                        @{account.service_username}
                                                                    </option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                        
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Daisy Chain →</label>
                                                            <select
                                                                className="w-full border border-gray-300 rounded px-2 py-1 text-sm"
                                                                value={projectToAccountMap['daisy-chain']}
                                                                onChange={(e) => setProjectToAccountMap({...projectToAccountMap, 'daisy-chain': e.target.value})}
                                                            >
                                                                <option value="">Select Instagram Account</option>
                                                                {instagramAccounts.map(account => (
                                                                    <option key={account.id} value={account.id}>
                                                                        @{account.service_username}
                                                                    </option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    </div>
                                                    
                                                    <p className="text-xs text-green-600 mt-3">
                                                        ✅ Once assigned, Instagram posts will auto-schedule to the correct accounts!
                                                    </p>
                                                </div>
                                            )}
                                            
                                            <p className="text-xs text-blue-600 mt-2">
                                                💡 After adding your API key, click "Fetch My Instagram Accounts" to see your connected accounts
                                            </p>
                                        </div>
                                    </div>

                                    <div className="mt-4 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
                                        <h3 className="font-semibold text-yellow-800 mb-2">📝 Manual Workflow</h3>
                                        <p className="text-sm text-yellow-700">After importing content:</p>
                                        <ul className="text-xs text-yellow-600 mt-2 space-y-1 list-disc list-inside">
                                            <li>Generate images (30-60 seconds)</li>
                                            <li>Schedule Instagram (if Buffer connected)</li>
                                            <li>Copy LinkedIn posts + download images</li>
                                            <li>Copy email drafts → paste into IONOS/Gmail</li>
                                        </ul>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <h2 className="text-2xl font-bold mb-4">📥 Import Content from Claude</h2>
                                    
                                    <p className="text-sm text-gray-600 mb-4">Paste the JSON response you got from Claude.ai below:</p>
                                    
                                    <textarea
                                        className="w-full h-64 border border-gray-300 rounded-lg p-3 font-mono text-sm mb-4"
                                        placeholder='Paste JSON here... should start with { and end with }'
                                        value={manualContent}
                                        onChange={(e) => setManualContent(e.target.value)}
                                    />

                                    <div className="flex space-x-3">
                                        <button
                                            onClick={() => setShowManualImport(false)}
                                            className="flex-1 bg-gray-500 text-white py-3 rounded-lg font-semibold hover:bg-gray-600"
                                        >
                                            ← Back
                                        </button>
                                        <button
                                            onClick={importManualContent}
                                            disabled={!manualContent}
                                            className="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 disabled:bg-gray-300"
                                        >
                                            ✨ Import & View Content
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-8">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-4xl font-bold mb-2">📊 This Week's Content</h1>
                                <p className="text-gray-600">Generated for week of {new Date().toLocaleDateString()}</p>
                            </div>
                            <div className="space-x-4">
                                <button
                                    onClick={() => generateImages(false)}
                                    disabled={generatingImages}
                                    className="bg-purple-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-purple-700 disabled:bg-gray-300"
                                >
                                    {generatingImages ? `⏳ ${imageProgress}` : '🎨 Generate Images (Free)'}
                                </button>
                                {generatedContent && (
                                    <button
                                        onClick={() => generateImages(true)}
                                        disabled={generatingImages}
                                        className="bg-orange-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-orange-700 disabled:bg-gray-300"
                                    >
                                        🔄 Regenerate Images
                                    </button>
                                )}
                                {apiKeys.buffer && (
                                    <button
                                        onClick={scheduleInstagram}
                                        disabled={isScheduling}
                                        className="bg-pink-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-pink-700 disabled:bg-gray-300"
                                    >
                                        {isScheduling ? '⏳ Scheduling...' : '📱 Schedule Instagram Posts'}
                                    </button>
                                )}
                                <button
                                    onClick={downloadContent}
                                    className="bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-gray-700"
                                >
                                    📥 Download JSON
                                </button>
                                <button
                                    onClick={() => setShowSetup(true)}
                                    className="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700"
                                >
                                    ⚙️ Settings
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {projects.map(project => {
                                const content = generatedContent[project.id];
                                if (!content) return null;

                                return (
                                    <div key={project.id} className={`bg-white rounded-lg shadow-lg p-6 border-l-4 border-${project.color}-500`}>
                                        <h2 className="text-2xl font-bold mb-4">{project.name}</h2>
                                        
                                        {content.emails && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">📧 Email Drafts (Copy & Send Manually)</h3>
                                                {content.emails.map((email, i) => (
                                                    <div key={i} className="bg-yellow-50 border border-yellow-200 p-4 rounded mb-3">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div className="font-medium text-sm text-gray-800">Subject: {email.subject}</div>
                                                            <button
                                                                onClick={() => {
                                                                    navigator.clipboard.writeText(`Subject: ${email.subject}\n\n${email.body}`);
                                                                    alert('✅ Email copied! Paste into IONOS or Gmail.');
                                                                }}
                                                                className="text-xs bg-yellow-600 text-white px-3 py-1 rounded hover:bg-yellow-700"
                                                            >
                                                                📋 Copy Email
                                                            </button>
                                                        </div>
                                                        <div className="text-xs text-gray-700 mt-2 whitespace-pre-wrap bg-white p-3 rounded border border-gray-200 max-h-40 overflow-y-auto">
                                                            {email.body}
                                                        </div>
                                                        <div className="text-xs text-gray-500 mt-2 italic">
                                                            💡 Copy this and paste into IONOS webmail or Gmail
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {content.social && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">📱 Social Posts</h3>
                                                {content.social.map((post, i) => {
                                                    const imageKey = `${project.id}-${i}`;
                                                    const isLocked = lockedImages[imageKey];
                                                    
                                                    return (
                                                        <div key={i} className="bg-gray-50 p-3 rounded mb-2">
                                                            <div className="flex justify-between text-xs text-gray-600 mb-1">
                                                                <span>{post.platform}</span>
                                                                <span>{post.scheduledDay}</span>
                                                            </div>
                                                            {post.imageUrl && (
                                                                <div className="relative">
                                                                    <img 
                                                                        src={post.imageUrl} 
                                                                        alt="Social media image" 
                                                                        className={`w-full h-48 object-cover rounded mb-2 ${isLocked ? 'border-4 border-green-500' : ''}`}
                                                                    />
                                                                    <div className="absolute top-2 right-2 space-x-2">
                                                                        <button
                                                                            onClick={() => toggleImageLock(project.id, i)}
                                                                            className={`px-3 py-1 rounded-full text-xs font-semibold ${
                                                                                isLocked 
                                                                                    ? 'bg-green-600 text-white' 
                                                                                    : 'bg-white text-gray-700 border border-gray-300'
                                                                            }`}
                                                                        >
                                                                            {isLocked ? '🔒 Locked' : '🔓 Unlock'}
                                                                        </button>
                                                                        <label className="px-3 py-1 rounded-full text-xs font-semibold bg-blue-600 text-white cursor-pointer hover:bg-blue-700">
                                                                            📤 Upload
                                                                            <input 
                                                                                type="file" 
                                                                                accept="image/*"
                                                                                className="hidden"
                                                                                onChange={(e) => {
                                                                                    if (e.target.files && e.target.files[0]) {
                                                                                        uploadImage(project.id, i, e.target.files[0]);
                                                                                    }
                                                                                }}
                                                                            />
                                                                        </label>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            <div className="text-sm line-clamp-3">{post.content}</div>
                                                            {post.imageUrl && (
                                                                <a 
                                                                    href={post.imageUrl} 
                                                                    download={`${project.id}-${post.platform}-${post.scheduledDay}.png`}
                                                                    className="text-xs text-blue-600 hover:underline mt-2 block"
                                                                >
                                                                    💾 Download Image
                                                                </a>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        {content.podcast && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">🎙️ Podcast</h3>
                                                <div className="bg-gray-50 p-3 rounded">
                                                    <div className="font-medium text-sm">{content.podcast.title}</div>
                                                    <div className="text-xs text-gray-600 mt-1 line-clamp-3">{content.podcast.outline}</div>
                                                </div>
                                            </div>
                                        )}

                                        {content.updates && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">🔧 Updates</h3>
                                                <div className="bg-gray-50 p-3 rounded text-sm">{content.updates}</div>
                                            </div>
                                        )}

                                        {content.ideas && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">💡 Service Ideas</h3>
                                                <div className="bg-gray-50 p-3 rounded text-sm">{content.ideas}</div>
                                            </div>
                                        )}

                                        {content.resources && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">📚 Resources</h3>
                                                <div className="bg-gray-50 p-3 rounded text-sm">{content.resources}</div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<AutomationHub />, document.getElementById('root'));
    </script>
</body>
</html>
