<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margaret's 6-Project Automation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AutomationHub = () => {
            const [apiKeys, setApiKeys] = useState({
                buffer: ''
            });
            const [generatedContent, setGeneratedContent] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isScheduling, setIsScheduling] = useState(false);
            const [showSetup, setShowSetup] = useState(true);
            const [manualContent, setManualContent] = useState('');
            const [showManualImport, setShowManualImport] = useState(false);
            const [generatingImages, setGeneratingImages] = useState(false);
            const [imageProgress, setImageProgress] = useState('');
            
            const INSTAGRAM_PROFILE_ID = 'nUvQZNCxWWg0OjpJmQPeXemJWB_CfD_ihb8UMEeyuD_';

            const projects = [
                { id: 'podcast-pal', name: 'Podcast Pal', color: 'blue' },
                { id: 'breaking-cycle', name: 'Breaking the Cycle', color: 'purple' },
                { id: 'ai-bots', name: 'AI Teaching Bots', color: 'green' },
                { id: 'consultancy', name: 'Education Consultancy', color: 'yellow' },
                { id: 'echoes', name: 'Echoes', color: 'pink' },
                { id: 'daisy-chain', name: 'Daisy Chain', color: 'indigo' }
            ];

            const importManualContent = () => {
                try {
                    const content = JSON.parse(manualContent);
                    setGeneratedContent(content);
                    setShowSetup(false);
                    setShowManualImport(false);
                } catch (error) {
                    alert('Error parsing content. Make sure you copied the entire JSON from Claude.');
                }
            };

            const generateImages = async () => {
                if (!generatedContent) return;
                
                setGeneratingImages(true);
                const updatedContent = JSON.parse(JSON.stringify(generatedContent));
                
                try {
                    let totalPosts = 0;
                    let generatedCount = 0;
                    
                    // Count total social posts
                    Object.values(generatedContent).forEach(project => {
                        if (project.social) totalPosts += project.social.length;
                    });
                    
                    // Generate images for each social post
                    for (const [projectId, projectData] of Object.entries(updatedContent)) {
                        if (projectData.social) {
                            for (let i = 0; i < projectData.social.length; i++) {
                                const post = projectData.social[i];
                                generatedCount++;
                                setImageProgress(`Generating image ${generatedCount} of ${totalPosts}...`);
                                
                                // Create prompt from post content
                                const imagePrompt = createImagePrompt(projectId, post.content, post.platform);
                                
                                // Pollinations.ai uses a simple URL structure - much easier!
                                const encodedPrompt = encodeURIComponent(imagePrompt);
                                const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1200&height=1200&nologo=true`;
                                
                                // Store the image URL
                                post.imageUrl = imageUrl;
                                
                                // Small delay to be respectful of the free service
                                await new Promise(resolve => setTimeout(resolve, 500));
                            }
                        }
                    }
                    
                    setGeneratedContent(updatedContent);
                    setImageProgress('');
                    alert('✅ Images generated! Scroll through your posts to see them.');
                } catch (error) {
                    alert('Error generating images: ' + error.message);
                } finally {
                    setGeneratingImages(false);
                }
            };
            
            const createImagePrompt = (projectId, postContent, platform) => {
                const baseStyle = "ultra high quality, professional photography, 2026 social media aesthetic, trending visual style, ";
                
                // Extract key themes from caption for intentional matching
                const contentLower = postContent.toLowerCase();
                
                // Weekly rotation for variety
                const now = new Date();
                const weekNumber = Math.floor((now - new Date(now.getFullYear(), 0, 1)) / 604800000);
                const weekMod = weekNumber % 3;
                
                let specificPrompt = "";
                
                // PODCAST PAL - Green branding, international collaboration
                if (projectId === 'podcast-pal') {
                    if (contentLower.includes('student') && contentLower.includes('confidence')) {
                        specificPrompt = "diverse students collaborating with headphones and laptops, bright lime green accent wall, international flags, modern educational space, natural light, authentic candid moment, professional education photography";
                    } else if (contentLower.includes('curriculum') || contentLower.includes('toolkit')) {
                        specificPrompt = "sleek podcast microphone on desk with green plant, modern minimalist workspace, lime green accents, educational materials visible, clean professional aesthetic, soft natural lighting";
                    } else {
                        specificPrompt = weekMod === 0 
                            ? "international video call on laptop screen, diverse students waving, green themed workspace, modern tech aesthetic, warm authentic moment"
                            : weekMod === 1
                            ? "professional podcast recording setup, lime green soundproofing, modern studio, headphones and mic, educational tech theme"
                            : "global collaboration concept, world map with green connecting lines, modern educational technology, inspiring and professional";
                    }
                }
                
                // BREAKING THE CYCLE - Dark dramatic, healing journey
                else if (projectId === 'breaking-cycle') {
                    if (contentLower.includes('pattern') || contentLower.includes('heal')) {
                        specificPrompt = "rusty old chain breaking apart in dramatic lighting, dark brown background with warm golden glow, powerful healing metaphor, cinematic high contrast, textured and raw";
                    } else if (contentLower.includes('episode 1') || contentLower.includes('live')) {
                        specificPrompt = "open journal on dark wooden table with pen, soft candlelight, handwritten healing words faintly visible, warm brown and cream tones, intimate contemplative mood, cozy aesthetic";
                    } else {
                        specificPrompt = weekMod === 0
                            ? "single person walking away from darkness toward warm sunrise, silhouette, healing journey visual metaphor, hope and transformation, cinematic dramatic lighting"
                            : weekMod === 1  
                            ? "broken chains transformed into blooming wildflowers, dark background with golden light, healing and growth symbolism, beautiful artistic composition"
                            : "pathway splitting in misty forest, choosing new direction, soft morning light, personal transformation metaphor, peaceful determination, atmospheric and hopeful";
                    }
                }
                
                // AI BOTS - Green tech, friendly educational
                else if (projectId === 'ai-bots') {
                    if (contentLower.includes('student') && contentLower.includes('embarrassed')) {
                        specificPrompt = "friendly AI interface on laptop screen helping student, soft green glow, cozy educational setting, warm encouraging atmosphere, modern classroom, authentic candid moment";
                    } else if (contentLower.includes('support') || contentLower.includes('diverse')) {
                        specificPrompt = "holographic green AI neural network floating above desk, educational icons, modern technology meets teaching, futuristic yet approachable, inspiring innovation, clean aesthetic";
                    } else {
                        specificPrompt = "teacher and student collaborating with tablet showing educational AI app, green accent lighting, modern bright classroom, natural interaction, professional education photography";
                    }
                }
                
                // CONSULTANCY - Professional yellow/grey
                else if (projectId === 'consultancy') {
                    if (contentLower.includes('training') || contentLower.includes('staff')) {
                        specificPrompt = "professional educators in training workshop, modern conference room, yellow accent wall, collaborative engagement, natural light, contemporary corporate aesthetic, authentic interaction";
                    } else if (contentLower.includes('curriculum') || contentLower.includes('consultation')) {
                        specificPrompt = "organized educational planning materials on modern desk, yellow folders and notebooks, overhead flat lay shot, clean professional workspace, minimalist aesthetic";
                    } else {
                        specificPrompt = "diverse teachers collaborating around whiteboard, modern school setting, yellow decor accents, professional development atmosphere, warm natural lighting, engaging moment";
                    }
                }
                
                // ECHOES - Soft turquoise, gentle legacy
                else if (projectId === 'echoes') {
                    if (contentLower.includes('legacy') || contentLower.includes('record')) {
                        specificPrompt = "elderly hands gently holding young child's hands, soft turquoise lighting, tender multi-generational moment, emotional family photography, loving connection, peaceful and heartfelt";
                    } else if (contentLower.includes('grandmother') || contentLower.includes('memory')) {
                        specificPrompt = "vintage photo album pages being turned, soft focus, turquoise and grey color tones, nostalgic family memories, timeless moments, gentle and peaceful composition";
                    } else {
                        specificPrompt = weekMod === 0
                            ? "family silhouettes walking together at sunset, soft turquoise and lavender sky, generations united, peaceful legacy theme, serene hopeful atmosphere"
                            : "old family photographs scattered on table with soft lighting, turquoise accent, cherished memories theme, intimate and gentle, emotional storytelling";
                    }
                }
                
                // DAISY CHAIN - Soft wellness, natural
                else if (projectId === 'daisy-chain') {
                    if (contentLower.includes('monday') || contentLower.includes('slow')) {
                        specificPrompt = "extreme close-up single white daisy with morning dew drops on petals, soft blue-grey background, macro nature photography, peaceful simplicity, golden hour soft light, mindful meditative aesthetic";
                    } else if (contentLower.includes('poll') || contentLower.includes('wellness')) {
                        specificPrompt = "field of white daisies gently swaying in breeze, shallow depth of field, soft blue sky backdrop, peaceful natural wellness setting, serene pastoral scene, calming composition";
                    } else if (contentLower.includes('rest') || contentLower.includes('weekend')) {
                        specificPrompt = "single daisy in vintage glass bottle on windowsill, soft natural window light, minimalist composition, peaceful wellness aesthetic, gentle blue-grey tones, contemplative restful mood";
                    } else {
                        specificPrompt = "daisy wreath on soft blue fabric, natural beauty, peaceful wellness theme, soft focus photography, gentle aesthetic, mindful living visual";
                    }
                }
                
                const platformStyle = platform === 'Instagram' ? "square 1:1 composition, Instagram optimized" : "landscape 16:9 composition, LinkedIn optimized";
                
                // Unique seed for each post
                const seed = weekNumber * 1000 + Math.abs(postContent.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0));
                
                return `${baseStyle}${specificPrompt}, ${platformStyle}, no AI-generated text overlay, modern 2026 social media trends, visually stunning, seed:${seed}`;
            };

            const generatePrompt = () => {
                const prompt = `Generate a week's worth of content for Margaret's 6 business projects. Return ONLY valid JSON in this exact structure:

{
  "podcast-pal": {
    "emails": [{"subject": "...", "body": "..."}],
    "social": [{"platform": "LinkedIn", "content": "...", "scheduledDay": "Monday"}]
  },
  "breaking-cycle": {
    "social": [{"platform": "Instagram", "content": "...", "scheduledDay": "Wednesday"}]
  },
  "ai-bots": {
    "updates": "...",
    "social": [{"platform": "LinkedIn", "content": "...", "scheduledDay": "Tuesday"}]
  },
  "consultancy": {
    "emails": [{"subject": "...", "body": "..."}],
    "ideas": "..."
  },
  "echoes": {
    "emails": [{"subject": "B2B Partnership Pitch", "body": "..."}],
    "social": [{"platform": "LinkedIn", "content": "...", "scheduledDay": "Thursday"}]
  },
  "daisy-chain": {
    "social": [
      {"platform": "Instagram", "content": "Visual post concept...", "scheduledDay": "Monday"},
      {"platform": "Instagram", "content": "...", "scheduledDay": "Wednesday"},
      {"platform": "Instagram", "content": "...", "scheduledDay": "Friday"}
    ]
  }
}

CRITICAL - DO NOT MENTION:
❌ Wales (except in Echoes B2B context if relevant)
❌ NOS / National Online School / TCES
❌ "Where We Belong" podcast
❌ Benny or any NOS students
❌ PBL/Project-Based Learning (this is separate work)

PROJECT GUIDELINES:

PODCAST PAL:
- 1 newsletter email to schools (B2B pitch)
- 3 LinkedIn posts about international student podcasting exchange
- Focus: School partnerships, cultural exchange, global citizenship
- Complete 8-week curriculum toolkit
- Email will be sent via IONOS manually (just draft it)

BREAKING THE CYCLE:
- 3 Instagram posts promoting Episode 1 + teasing Episode 2
- Theme: Emotional healing, breaking relationship cycles, personal growth
- Audience growth focus
- NO new episode outline needed (Episode 2 not recorded yet)
- Warm, vulnerable, authentic tone

AI BOTS (Time For Class):
- Update notes for 3 Poe bots: TimeForClass (general teaching), TimeForClass-EAL (English support), TimeForClass-AI (AI literacy)
- 2 LinkedIn posts about educational AI, bot usage, teacher support
- NOT about PBL - general education focus

TIME FOR CLASS CONSULTANCY:
- 1 client outreach email (general education services, NOT PBL-specific)
- Ideas for new services/offerings
- Email will be sent via IONOS manually (just draft it)
- Focus: AI integration, curriculum consultation, teacher training

ECHOES:
- 1 B2B pitch email to hospices/funeral directors
- 2 LinkedIn thought leadership posts about digital legacy
- Email will be sent via Gmail manually (just draft it)
- Focus: Partnerships, milestone-triggered messages, AI personality modeling

DAISY CHAIN:
- 3 Instagram visual post concepts (NO voice notes)
- Ideas for resharing previous content
- Audience engagement (polls, questions about topics)
- Theme: Daisies, nature, wellness, slow living, mindfulness
- Keep consistent aesthetic

TONE: Warm, authentic, professional, inclusion-focused. "Different abilities, endless possibilities" for education content. Vulnerable and real for Breaking the Cycle. Professional for B2B pitches.`;
                
                navigator.clipboard.writeText(prompt);
                alert('✅ Prompt copied to clipboard!\n\nNow:\n1. Go to Claude.ai\n2. Paste this prompt\n3. Copy Claude\'s JSON response\n4. Come back here and click "Import Content"');
            };

            const scheduleInstagram = async () => {
                if (!apiKeys.buffer) {
                    alert('⚠️ Please add your Buffer API key first!\n\nGo to Settings and paste your Buffer API key.');
                    return;
                }
                
                setIsScheduling(true);
                
                try {
                    // Collect all Instagram posts
                    const instagramPosts = [];
                    Object.entries(generatedContent).forEach(([projectId, projectData]) => {
                        if (projectData.social) {
                            projectData.social.forEach(post => {
                                if (post.platform === 'Instagram') {
                                    instagramPosts.push({
                                        ...post,
                                        projectId
                                    });
                                }
                            });
                        }
                    });
                    
                    if (instagramPosts.length === 0) {
                        alert('No Instagram posts found to schedule!');
                        setIsScheduling(false);
                        return;
                    }
                    
                    // Schedule each post
                    let scheduled = 0;
                    for (const post of instagramPosts) {
                        const scheduledTime = getScheduledTime(post.scheduledDay);
                        
                        // Buffer Instagram posts require media URL to be included
                        const postText = post.imageUrl 
                            ? `${post.content}\n\n[Image: ${post.imageUrl}]`
                            : post.content;
                        
                        const response = await fetch('https://api.bufferapp.com/1/updates/create.json', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                access_token: apiKeys.buffer,
                                text: postText,
                                profile_ids: [INSTAGRAM_PROFILE_ID],
                                scheduled_at: scheduledTime
                            })
                        });
                        
                        if (response.ok) {
                            scheduled++;
                        }
                        
                        // Small delay to avoid rate limiting
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                    
                    alert(`✅ Success! Scheduled ${scheduled} Instagram posts via Buffer.\n\nThey'll post automatically throughout the week!`);
                    
                } catch (error) {
                    alert('Error scheduling Instagram posts:\n\n' + error.message + '\n\nMake sure:\n1. Buffer API key is correct\n2. Instagram is connected to Buffer\n3. You have available posting slots');
                } finally {
                    setIsScheduling(false);
                }
            };
            
            const getScheduledTime = (day) => {
                const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
                const today = new Date();
                const currentDay = today.getDay(); // 0 = Sunday, 1 = Monday, etc.
                const targetDay = days.indexOf(day) + 1; // Convert to 1-7 where Monday = 1
                
                let daysUntil = (targetDay - currentDay + 7) % 7;
                if (daysUntil === 0) daysUntil = 7; // If today, schedule for next week
                
                const targetDate = new Date(today);
                targetDate.setDate(today.getDate() + daysUntil);
                targetDate.setHours(10, 0, 0, 0); // 10 AM
                
                return Math.floor(targetDate.getTime() / 1000);
            };

            const downloadContent = () => {
                const blob = new Blob([JSON.stringify(generatedContent, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `content-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            if (showSetup) {
                return (
                    <div className="min-h-screen p-8">
                        <div className="max-w-2xl mx-auto">
                            <h1 className="text-4xl font-bold mb-2">🚀 Margaret's Automation Hub</h1>
                            <p className="text-gray-600 mb-8">Manage all 6 projects from one dashboard</p>

                            {!showManualImport ? (
                                <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                    <h2 className="text-2xl font-bold mb-4">Quick Start (100% Free)</h2>
                                    
                                    <div className="bg-green-50 border-l-4 border-green-400 p-4 mb-6">
                                        <h3 className="font-bold text-green-800 mb-2">✨ How This Works:</h3>
                                        <ol className="text-sm text-green-700 space-y-2 list-decimal list-inside">
                                            <li>Click "Copy Prompt" below</li>
                                            <li>Go to Claude.ai (the chat where you built this)</li>
                                            <li>Paste the prompt and hit enter</li>
                                            <li>Copy Claude's JSON response</li>
                                            <li>Come back here and paste it</li>
                                            <li>Review and schedule all your content!</li>
                                        </ol>
                                        <p className="text-xs text-green-600 mt-3">⏱️ Takes 2 minutes. Zero cost.</p>
                                    </div>

                                    <button
                                        onClick={generatePrompt}
                                        className="w-full bg-blue-600 text-white py-4 rounded-lg font-semibold hover:bg-blue-700 mb-4"
                                    >
                                        📋 Copy Prompt to Clipboard
                                    </button>

                                    <button
                                        onClick={() => setShowManualImport(true)}
                                        className="w-full bg-green-600 text-white py-4 rounded-lg font-semibold hover:bg-green-700"
                                    >
                                        ✅ I Got Claude's Response - Import Content
                                    </button>

                                    <div className="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                                        <h3 className="font-semibold text-blue-800 mb-2">📱 Optional: Instagram Auto-Posting</h3>
                                        <p className="text-sm text-blue-700 mb-3">Want Instagram posts to auto-schedule? Add your Buffer API key:</p>
                                        
                                        <div>
                                            <label className="block text-xs font-medium mb-1">
                                                Buffer API Key
                                                <a href="https://account.buffer.com/developers" target="_blank" className="text-blue-600 ml-2">(Get here)</a>
                                            </label>
                                            <input
                                                type="password"
                                                className="w-full border border-gray-300 rounded px-3 py-2 text-sm mb-2"
                                                placeholder="1/..."
                                                value={apiKeys.buffer}
                                                onChange={(e) => setApiKeys({...apiKeys, buffer: e.target.value})}
                                            />
                                            <p className="text-xs text-blue-600">
                                                ✅ Connect Instagram to Buffer first, then paste your API key here
                                            </p>
                                        </div>
                                    </div>

                                    <div className="mt-4 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
                                        <h3 className="font-semibold text-yellow-800 mb-2">📝 Manual Workflow</h3>
                                        <p className="text-sm text-yellow-700">After importing content:</p>
                                        <ul className="text-xs text-yellow-600 mt-2 space-y-1 list-disc list-inside">
                                            <li>Generate images (30-60 seconds)</li>
                                            <li>Schedule Instagram (if Buffer connected)</li>
                                            <li>Copy LinkedIn posts + download images</li>
                                            <li>Copy email drafts → paste into IONOS/Gmail</li>
                                        </ul>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <h2 className="text-2xl font-bold mb-4">📥 Import Content from Claude</h2>
                                    
                                    <p className="text-sm text-gray-600 mb-4">Paste the JSON response you got from Claude.ai below:</p>
                                    
                                    <textarea
                                        className="w-full h-64 border border-gray-300 rounded-lg p-3 font-mono text-sm mb-4"
                                        placeholder='Paste JSON here... should start with { and end with }'
                                        value={manualContent}
                                        onChange={(e) => setManualContent(e.target.value)}
                                    />

                                    <div className="flex space-x-3">
                                        <button
                                            onClick={() => setShowManualImport(false)}
                                            className="flex-1 bg-gray-500 text-white py-3 rounded-lg font-semibold hover:bg-gray-600"
                                        >
                                            ← Back
                                        </button>
                                        <button
                                            onClick={importManualContent}
                                            disabled={!manualContent}
                                            className="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 disabled:bg-gray-300"
                                        >
                                            ✨ Import & View Content
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-8">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-4xl font-bold mb-2">📊 This Week's Content</h1>
                                <p className="text-gray-600">Generated for week of {new Date().toLocaleDateString()}</p>
                            </div>
                            <div className="space-x-4">
                                <button
                                    onClick={generateImages}
                                    disabled={generatingImages}
                                    className="bg-purple-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-purple-700 disabled:bg-gray-300"
                                >
                                    {generatingImages ? `⏳ ${imageProgress}` : '🎨 Generate Images (Free)'}
                                </button>
                                {apiKeys.buffer && (
                                    <button
                                        onClick={scheduleInstagram}
                                        disabled={isScheduling}
                                        className="bg-pink-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-pink-700 disabled:bg-gray-300"
                                    >
                                        {isScheduling ? '⏳ Scheduling...' : '📱 Schedule Instagram Posts'}
                                    </button>
                                )}
                                <button
                                    onClick={downloadContent}
                                    className="bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-gray-700"
                                >
                                    📥 Download JSON
                                </button>
                                <button
                                    onClick={() => setShowSetup(true)}
                                    className="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700"
                                >
                                    ⚙️ Settings
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {projects.map(project => {
                                const content = generatedContent[project.id];
                                if (!content) return null;

                                return (
                                    <div key={project.id} className={`bg-white rounded-lg shadow-lg p-6 border-l-4 border-${project.color}-500`}>
                                        <h2 className="text-2xl font-bold mb-4">{project.name}</h2>
                                        
                                        {content.emails && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">📧 Email Drafts (Copy & Send Manually)</h3>
                                                {content.emails.map((email, i) => (
                                                    <div key={i} className="bg-yellow-50 border border-yellow-200 p-4 rounded mb-3">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div className="font-medium text-sm text-gray-800">Subject: {email.subject}</div>
                                                            <button
                                                                onClick={() => {
                                                                    navigator.clipboard.writeText(`Subject: ${email.subject}\n\n${email.body}`);
                                                                    alert('✅ Email copied! Paste into IONOS or Gmail.');
                                                                }}
                                                                className="text-xs bg-yellow-600 text-white px-3 py-1 rounded hover:bg-yellow-700"
                                                            >
                                                                📋 Copy Email
                                                            </button>
                                                        </div>
                                                        <div className="text-xs text-gray-700 mt-2 whitespace-pre-wrap bg-white p-3 rounded border border-gray-200 max-h-40 overflow-y-auto">
                                                            {email.body}
                                                        </div>
                                                        <div className="text-xs text-gray-500 mt-2 italic">
                                                            💡 Copy this and paste into IONOS webmail or Gmail
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {content.social && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">📱 Social Posts</h3>
                                                {content.social.map((post, i) => (
                                                    <div key={i} className="bg-gray-50 p-3 rounded mb-2">
                                                        <div className="flex justify-between text-xs text-gray-600 mb-1">
                                                            <span>{post.platform}</span>
                                                            <span>{post.scheduledDay}</span>
                                                        </div>
                                                        {post.imageUrl && (
                                                            <img 
                                                                src={post.imageUrl} 
                                                                alt="Generated social media image" 
                                                                className="w-full h-48 object-cover rounded mb-2"
                                                            />
                                                        )}
                                                        <div className="text-sm line-clamp-3">{post.content}</div>
                                                        {post.imageUrl && (
                                                            <a 
                                                                href={post.imageUrl} 
                                                                download={`${project.id}-${post.platform}-${post.scheduledDay}.png`}
                                                                className="text-xs text-blue-600 hover:underline mt-2 block"
                                                            >
                                                                💾 Download Image
                                                            </a>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {content.podcast && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">🎙️ Podcast</h3>
                                                <div className="bg-gray-50 p-3 rounded">
                                                    <div className="font-medium text-sm">{content.podcast.title}</div>
                                                    <div className="text-xs text-gray-600 mt-1 line-clamp-3">{content.podcast.outline}</div>
                                                </div>
                                            </div>
                                        )}

                                        {content.updates && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">🔧 Updates</h3>
                                                <div className="bg-gray-50 p-3 rounded text-sm">{content.updates}</div>
                                            </div>
                                        )}

                                        {content.ideas && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">💡 Service Ideas</h3>
                                                <div className="bg-gray-50 p-3 rounded text-sm">{content.ideas}</div>
                                            </div>
                                        )}

                                        {content.resources && (
                                            <div className="mb-4">
                                                <h3 className="font-semibold mb-2">📚 Resources</h3>
                                                <div className="bg-gray-50 p-3 rounded text-sm">{content.resources}</div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<AutomationHub />, document.getElementById('root'));
    </script>
</body>
</html>
